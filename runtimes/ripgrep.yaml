# Ripgrep Configuration
# Ripgrep is a line-oriented search tool that recursively searches your current directory

runtime:
  name: ripgrep
  display_name: Ripgrep
  aliases:
    - rg
  version_command: "--version"
  description: A line-oriented search tool that recursively searches your current directory for a regex pattern
  versions_url: "https://github.com/BurntSushi/ripgrep/releases"

versions:
  type: github
  repo: BurntSushi/ripgrep
  tag_pattern: "^(.+)$"

downloads:
  darwin-arm64:
    url_template: "https://github.com/BurntSushi/ripgrep/releases/download/{version}/ripgrep-{version}-aarch64-apple-darwin.tar.gz"
    format: tar.gz

  darwin-x64:
    url_template: "https://github.com/BurntSushi/ripgrep/releases/download/{version}/ripgrep-{version}-x86_64-apple-darwin.tar.gz"
    format: tar.gz

  linux-x64:
    url_template: "https://github.com/BurntSushi/ripgrep/releases/download/{version}/ripgrep-{version}-x86_64-unknown-linux-musl.tar.gz"
    format: tar.gz

  linux-arm64:
    url_template: "https://github.com/BurntSushi/ripgrep/releases/download/{version}/ripgrep-{version}-aarch64-unknown-linux-gnu.tar.gz"
    format: tar.gz

install:
  binary_path: rg
  additional_binaries: []
  strip_components: 1
  post_install_commands: []

environment:
  requires_isolation: false
