# Bun Runtime Configuration
# Built-in runtime for Realm

runtime:
  name: bun
  display_name: Bun
  aliases: []
  version_command: "--version"
  description: All-in-one JavaScript runtime & toolkit
  versions_url: "https://github.com/oven-sh/bun/releases"

versions:
  type: github
  repo: oven-sh/bun
  tag_pattern: "^bun-v(.+)$"

downloads:
  darwin-arm64:
    url_template: "https://github.com/oven-sh/bun/releases/download/bun-v{version}/bun-darwin-aarch64.zip"
    format: zip

  darwin-x64:
    url_template: "https://github.com/oven-sh/bun/releases/download/bun-v{version}/bun-darwin-x64.zip"
    format: zip

  linux-x64:
    url_template: "https://github.com/oven-sh/bun/releases/download/bun-v{version}/bun-linux-x64.zip"
    format: zip

  linux-arm64:
    url_template: "https://github.com/oven-sh/bun/releases/download/bun-v{version}/bun-linux-aarch64.zip"
    format: zip

install:
  binary_path: bun
  additional_binaries: [bunx]
  strip_components: 0
  post_install_commands: []

environment:
  requires_isolation: false
